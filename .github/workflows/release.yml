name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build release APK
      run: ./gradlew assembleRelease
      
    - name: Sign APK
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "Decoding keystore..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          
          echo "Signing APK..."
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            "${{ secrets.KEY_ALIAS }}"
          
          echo "Aligning APK..."
          zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-signed.apk
          
          rm -f keystore.jks
        else
          echo "Keystore not configured, creating unsigned APK"
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/app-release-signed.apk
        fi
      continue-on-error: true
      
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
    - name: Rename APK
      run: |
        mv app/build/outputs/apk/release/app-release-signed.apk \
           app/build/outputs/apk/release/long-sms-sender-${{ steps.get_version.outputs.VERSION }}.apk
      continue-on-error: true
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
        generate_release_notes: false
        body: |
          # Long SMS Sender v1.0.0
          
          ## 🎉 اولین نسخه منتشر شده | First Release
          
          یک برنامه اندروید حرفه‌ای برای ارسال پیامک‌های بلند به صورت SMS چندبخشی بدون تبدیل به MMS.
          
          A production-grade Android application for sending long text messages as multi-part SMS without MMS conversion.
          
          ## ✨ ویژگی‌های اصلی | Key Features
          
          - ✅ ارسال پیامک‌های با طول نامحدود به صورت چندبخشی | Send unlimited length SMS as multi-part
          - ✅ جلوگیری کامل از تبدیل به MMS | Absolutely prevent MMS conversion
          - ✅ انتخاب مخاطبین با جستجو | Contact selection with search
          - ✅ ورود دستی شماره تلفن (چند خطی) | Manual phone number input (multi-line)
          - ✅ شمارشگر بخش‌های پیامک به صورت لحظه‌ای | Real-time SMS segment counter
          - ✅ پشتیبانی کامل از زبان فارسی و انگلیسی | Full Persian & English language support
          - ✅ پشتیبانی از حالت تاریک | Dark mode support
          - ✅ پشتیبانی از RTL | RTL layout support
          - ✅ بدون نیاز به اینترنت | No internet permission required
          - ✅ بدون تبلیغات و ردیابی | No ads, no analytics, no tracking
          
          ## 🔒 حریم خصوصی | Privacy
          
          این برنامه هیچ اطلاعاتی را جمع‌آوری یا ذخیره نمی‌کند. تمام پیامک‌ها مستقیماً از دستگاه شما ارسال می‌شوند.
          
          This app does not collect or store any information. All SMS messages are sent directly from your device.
          
          ## 📥 دانلود | Download
          
          - **کافه‌بازار | CafeBazaar:** https://cafebazaar.ir/app/com.afrouzi.longsmssender
          - **GitHub Releases:** این صفحه | This page
          
          ## 🛠️ جزئیات فنی | Technical Details
          
          - **Package Name:** com.afrouzi.longsmssender
          - **Min SDK:** 23 (Android 6.0)
          - **Target SDK:** 34 (Android 14)
          - **Language:** Kotlin 100%
          - **Architecture:** MVVM
          
          ## 👤 توسعه‌دهنده | Developer
          
          **Mostafa Afrouzi | مصطفی افروزی**
          
