name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build release APK
      run: ./gradlew assembleRelease
      
    - name: Sign APK
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "Decoding keystore..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          
          # Verify keystore was decoded correctly
          if [ ! -f keystore.jks ] || [ ! -s keystore.jks ]; then
            echo "Error: Failed to decode keystore"
            exit 1
          fi
          
          echo "Keystore decoded successfully ($(stat -c%s keystore.jks) bytes)"
          
          # Find zipalign and apksigner in Android SDK
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name zipalign | head -n 1)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | head -n 1)
          
          if [ -z "$ZIPALIGN" ] || [ -z "$APKSIGNER" ]; then
            echo "Error: zipalign or apksigner not found in Android SDK"
            exit 1
          fi
          
          echo "Using zipalign: $ZIPALIGN"
          echo "Using apksigner: $APKSIGNER"
          
          echo "Aligning APK before signing..."
          $ZIPALIGN -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          
          if [ $? -ne 0 ]; then
            echo "Error: zipalign failed"
            exit 1
          fi
          
          echo "Signing APK..."
          $APKSIGNER sign --ks keystore.jks \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          
          if [ $? -ne 0 ]; then
            echo "Error: APK signing failed. Please check:"
            echo "  1. KEYSTORE_BASE64 is correctly encoded"
            echo "  2. KEYSTORE_PASSWORD is correct"
            echo "  3. KEY_PASSWORD is correct"
            echo "  4. KEY_ALIAS matches the keystore"
            rm -f keystore.jks
            exit 1
          fi
          
          echo "Verifying signature..."
          $APKSIGNER verify --verbose app/build/outputs/apk/release/app-release-signed.apk
          
          if [ $? -ne 0 ]; then
            echo "Error: Signature verification failed"
            rm -f keystore.jks
            exit 1
          fi
          
          # Remove temporary files
          rm -f keystore.jks app/build/outputs/apk/release/app-release-aligned.apk
          
          # Remove unsigned APK to avoid uploading it
          rm -f app/build/outputs/apk/release/app-release-unsigned.apk
          
          echo "APK signed successfully!"
        else
          echo "Keystore not configured, creating unsigned APK"
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/app-release-signed.apk
        fi
      
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
    - name: Rename APK
      run: |
        if [ ! -f app/build/outputs/apk/release/app-release-signed.apk ]; then
          echo "Error: Signed APK not found. Signing must have failed."
          exit 1
        fi
        mv app/build/outputs/apk/release/app-release-signed.apk \
           app/build/outputs/apk/release/long-sms-sender-${{ steps.get_version.outputs.VERSION }}.apk
        
        # Remove any unsigned or aligned APKs
        rm -f app/build/outputs/apk/release/app-release-unsigned.apk
        rm -f app/build/outputs/apk/release/app-release-aligned.apk
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
        generate_release_notes: false
        body: |
          # Long SMS Sender ${{ github.ref_name }}

          ## Release notes | یادداشت انتشار

          ### English — v1.1.0

          - **SIM selection**: choose default SIM or a specific SIM slot on dual-SIM devices (requires phone state permission when listing SIMs).
          - **Recipient groups**: save, load, and delete named groups of recipients for bulk sending.
          - **Scheduled SMS**: schedule send time with confirmation; optional battery-optimization prompt for reliability; manage from the toolbar (clock icon)—cancel, send now, or reschedule.
          - **Prepared messages**: save and reuse message templates next to the message field.
          - **Share into app**: receive text and numbers from other apps via Share / `sms:` / `smsto:` intents.
          - **Send queue controls**: pause, resume, or cancel long bulk sends; improved send status and share report.
          - **UX & fixes**: correct multi-number contact selection; labels and pickers follow app language after switching EN/فا without restarting; segment counter and recipient status refresh with locale.

          ### فارسی — نسخه ۱.۱.۰

          - **انتخاب سیم‌کارت**: سیم پیش‌فرض یا اسلات مشخص روی دستگاه دو سیم‌کارته (در صورت نیاز مجوز وضعیت تلفن برای نمایش فهرست سیم‌ها).
          - **گروه گیرنده**: ذخیره، بارگذاری و حذف گروه‌های نام‌دار برای ارسال گروهی.
          - **پیام زمان‌بندی‌شده**: انتخاب زمان با تأیید؛ در صورت نیاز درخواست مستثنی شدن از بهینه‌سازی باتری؛ مدیریت از نوار بالا (آیکون ساعت)—لغو، ارسال فوری یا زمان جدید.
          - **پیام‌های آماده**: ذخیره و استفادهٔ سریع از قالب‌ها کنار فیلد پیام.
          - **اشتراک‌گذاری به برنامه**: دریافت متن و شماره از برنامه‌های دیگر از مسیر Share و لینک‌های `sms`/`smsto`.
          - **کنترل صف ارسال**: توقف موقت، ادامه یا لغو برای ارسال‌های طولانی؛ بهبود گزارش وضعیت و اشتراک گزارش.
          - **تجربه کاربری و رفع اشکال**: انتخاب درست چند شماره برای یک مخاطب؛ هماهنگی برچسب‌ها و انتخابگر تاریخ/زمان با زبان برنامه بدون نیاز به بستن کامل اپ؛ به‌روز شدن شمارنده بخش و وضعیت گیرندگان هنگام تعویض زبان.

          ---

          ## 🔒 Privacy | حریم خصوصی

          No data collection. SMS is sent from your device only. Extra permissions are used only for SIM listing, scheduling reliability, contacts, and SMS sending as documented in the README.

          ## 📥 Download | دانلود

          - **CafeBazaar:** https://cafebazaar.ir/app/com.afrouzi.longsmssender
          - Attachments: signed APK on this release (when `KEYSTORE_*` secrets are configured).

          ## 🛠️ Technical | فنی

          - **Package:** `com.afrouzi.longsmssender`
          - **Min SDK:** 23 · **Target SDK:** 34
          - **Kotlin / MVVM**

          ## 👤 Developer | توسعه‌دهنده

          **Mostafa Afrouzi** · https://afrouzi.ir · https://github.com/mostafaafrouzi

          ---
          **Made with ❤️ for long SMS without unwanted MMS conversion**

